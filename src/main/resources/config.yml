repo-name: default

repositories:
  # default max repositories each player can own
  default-max-per-player: 1
  # permission overrides, highest matching value wins
  max-by-permission:
    gitblock.repo.limit.2: 2
    gitblock.repo.limit.5: 5

commit-message:
  # used when /gitblock commit has no message and for GUI quick commit
  # supported tokens: {player} {repo} {branch} {time} {dirty}
  default-template: "manual commit by {player} in {repo} at {time}"

permissions:
  # base command gate for /gitblock
  use: gitblock.use
  # admin-level operations (bench/cancel/checkpoint)
  admin: gitblock.admin
  # permission required for /gitblock jobs
  # set to gitblock.use if you want all users with base access to view jobs
  jobs-view: gitblock.admin

i18n:
  # default language for console and unknown locales
  default-locale: zh_cn
  # fallback language when key is missing
  fallback-locale: en_us
  # force all senders to a locale, empty means auto-detect by player locale
  force-locale: ""
  # chat prefix for localized messages
  prefix: "&8[&bGitBlock&8]&r "

apply:
  max-blocks-per-tick: 1500
  tick-budget-ms: 2
  max-queued-jobs: 8
  # parsed BlockData cache size during apply (0 to disable)
  blockdata-cache-size: 2048
  # chunk unload requests processed per tick after apply
  max-chunk-unloads-per-tick: 64
  # reject-new: reject new apply jobs when pending queue is full
  # drop-oldest-pending: cancel oldest pending apply job and accept new one
  queue-overflow-policy: reject-new

checkpoints:
  every-commits: 20

operations:
  # true: serialize all mutating GitBlock operations (recommended)
  # false: keep previous loose concurrency behavior
  serialize-mutations: true
  # minimum interval between /gitblock diff requests per sender
  diff-cooldown-ms: 1000

history:
  # first-parent: replay-safe for GitBlock delta format
  # all-parents: merge-base also considers merge-parent links, with safe fallback when replay path is ambiguous
  merge-base-mode: first-parent
  # cache entries for transition replay results (from->to)
  transition-cache-size: 64
  # cache entries for ancestor patch materialization
  patch-cache-size: 64

storage:
  sqlite:
    # Write-Ahead Logging improves concurrent read/write performance
    wal: true
    # NORMAL sync is faster and acceptable for plugin-level durability
    synchronous-normal: true
    # wait time for locked database before failing
    busy-timeout-ms: 5000
