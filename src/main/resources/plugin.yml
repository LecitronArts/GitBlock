name: GitBlock
version: '${version}'
main: io.froststream.gitblock.GitBlock
api-version: '1.21'
authors: [LecitronArts]
description: Git-inspired block history and checkout workflow for creative servers.
website: weeaxe.cn
libraries:
  - org.xerial:sqlite-jdbc:3.46.0.0
commands:
  GitBlock:
    description: GitBlock command entry point
    usage: /gitblock <help|menu|pos1|pos2|init|status|commit|log|checkout|branch|branches|switch|merge|diff|revert|jobs|cancel|bench|checkpoint>
    permission: gitblock.use
permissions:
  GitBlock.use:
    description: Allows usage of base GitBlock commands
    default: true
  GitBlock.admin:
    description: Reserved for admin-level management commands
    default: op
  GitBlock.bypass.quota:
    description: Reserved quota bypass for future features
    default: op
